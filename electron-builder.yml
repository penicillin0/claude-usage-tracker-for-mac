appId: com.penicillin0.claude-usage-tracker
productName: Claude Usage Tracker
directories:
  output: release

files:
  - dist/**/*
  - assets/**/*
  - node_modules/**/*
  - package.json
  - "!node_modules/**/test/**"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/.bin"
  - "node_modules/.bin/ccusage*"  # Include ccusage binary

# Unpack certain files from asar for native execution
asarUnpack:
  - node_modules/ccusage/**/*
  - node_modules/.bin/ccusage*

mac:
  category: public.app-category.productivity
  icon: build/icons/icon.png
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

# Include extra resources
extraResources:
  - from: node_modules/ccusage
    to: ccusage
    filter:
      - "**/*"